<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard • GRC Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="flex">
    <!-- Sidebar -->
    <div class="w-72 bg-white h-screen shadow-xl fixed">
      <div class="p-8 border-b">
        <h1 class="text-3xl font-bold text-gray-900">GRC</h1>
        <p class="text-blue-600">Global Research Centre</p>
      </div>
      <nav class="p-6 space-y-2">
        <a href="#" onclick="showSection('workshops')" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-blue-50 active">
          <i class="fas fa-chalkboard-teacher text-xl"></i> Workshops
        </a>
        <a href="#" onclick="showSection('publications')" class="flex items-center gap-4 px-6 py-4 rounded-2xl hover:bg-blue-50">
          <i class="fas fa-book text-xl"></i> Publications
        </a>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="ml-72 flex-1 p-10">
      <div class="flex justify-between items-center mb-10">
        <h1 class="text-4xl font-bold text-gray-900" id="pageTitle">Workshops Management</h1>
        <button onclick="logout()" class="flex items-center gap-3 text-red-600 hover:text-red-700 font-medium">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
      </div>

      <!-- Workshops Section -->
      <div id="workshopsSection">
        <button onclick="showAddWorkshopModal()" 
                class="mb-8 bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl flex items-center gap-3 text-lg font-medium">
          <i class="fas fa-plus"></i> Add New Workshop
        </button>
        <div id="workshopsList" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
      </div>

      <!-- Publications Section -->
      <div id="publicationsSection" class="hidden">
        <button onclick="showAddPublicationModal()" 
                class="mb-8 bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl flex items-center gap-3 text-lg font-medium">
          <i class="fas fa-plus"></i> Add New Publication
        </button>
        <div id="publicationsList" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
      </div>
    </div>
  </div>

  <script>
    async function loadWorkshops() {
      const res = await fetch('/api/workshops');
      const data = await res.json();
      const container = document.getElementById('workshopsList');
      container.innerHTML = '';

      if (data.data.workshops?.length > 0) {
        data.data.workshops.forEach(w => {
          container.innerHTML += `
            <div class="bg-white p-6 rounded-3xl shadow hover:shadow-xl transition">
              <h3 class="font-semibold text-xl">${w.title}</h3>
              <p class="text-blue-600 text-sm mt-1">${w.date} • ${w.location || ''}</p>
              <p class="text-gray-600 mt-3 line-clamp-4">${w.description || ''}</p>
            </div>`;
        });
      } else {
        container.innerHTML = `<p class="text-gray-500 text-center py-10">No workshops yet. Add your first one!</p>`;
      }
    }

    async function loadPublications() {
      const res = await fetch('/api/publications');
      const data = await res.json();
      const container = document.getElementById('publicationsList');
      container.innerHTML = '';

      if (data.data.publications?.length > 0) {
        data.data.publications.forEach(p => {
          container.innerHTML += `
            <div class="bg-white p-6 rounded-3xl shadow hover:shadow-xl transition">
              <h3 class="font-semibold text-xl">${p.title}</h3>
              <p class="text-blue-600 text-sm">${p.authors} • ${p.year}</p>
              <p class="text-gray-600 mt-3 line-clamp-4">${p.description || ''}</p>
            </div>`;
        });
      } else {
        container.innerHTML = `<p class="text-gray-500 text-center py-10">No publications yet.</p>`;
      }
    }

    function showSection(section) {
      document.getElementById('workshopsSection').classList.add('hidden');
      document.getElementById('publicationsSection').classList.add('hidden');
      document.getElementById(section + 'Section').classList.remove('hidden');
      document.getElementById('pageTitle').textContent = section === 'workshops' ? 'Workshops Management' : 'Publications Management';
    }

    async function showAddWorkshopModal() {
      const title = prompt("Workshop Title:");
      if (!title) return;
      const description = prompt("Description:");
      const date = prompt("Date (YYYY-MM-DD):");
      const location = prompt("Location:");
      const image = prompt("Image URL (optional):");

      await fetch('/api/admin/workshops', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({title, description, date, location, image})
      });
      alert("✅ Workshop Added!");
      loadWorkshops();
    }

    async function showAddPublicationModal() {
      const title = prompt("Publication Title:");
      if (!title) return;
      const authors = prompt("Authors:");
      const year = prompt("Year:");
      const description = prompt("Description:");
      const link = prompt("Link/URL:");
      const image = prompt("Image URL:");

      await fetch('/api/admin/publications', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({title, authors, year, description, link, image})
      });
      alert("✅ Publication Added!");
      loadPublications();
    }

    function logout() {
      if (confirm("Logout?")) window.location.href = 'login.html';
    }

    // Load data on page load
    window.onload = () => {
      loadWorkshops();
      loadPublications();
    };
  </script>
</body>
</html>
