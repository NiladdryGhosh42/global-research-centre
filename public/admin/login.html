<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • GRC Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .hero-bg { background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%); }
  </style>
</head>
<body class="hero-bg min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
    <div class="p-12">
      <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-gray-900">Global Research Centre</h1>
        <p class="text-blue-600 font-semibold mt-2">ADMIN PANEL</p>
      </div>

      <h2 class="text-2xl font-semibold text-center mb-8">Sign In</h2>

      <div class="space-y-6">
        <input type="text" id="username" value="grcadmin" 
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600 text-lg" placeholder="Username">
        
        <input type="password" id="password" value="GrcAdmin2026Secure" 
               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-600 text-lg" placeholder="Password">
        
        <button onclick="handleLogin()" 
                class="w-full bg-blue-600 hover:bg-blue-700 transition-all py-4 rounded-2xl text-white font-semibold text-lg shadow-lg">
          Login to Dashboard
        </button>
      </div>

      <p id="message" class="text-red-500 text-center mt-6 font-medium min-h-[24px]"></p>
    </div>
  </div>

  <script>
    async function handleLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const message = document.getElementById('message');

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          window.location.href = 'dashboard.html';
        } else {
          message.textContent = '❌ Invalid username or password';
        }
      } catch (err) {
        message.textContent = '❌ Connection error';
      }
    }
  </script>
</body>
</html>
