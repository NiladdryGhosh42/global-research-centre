<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - GRC</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 to-blue-900 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Global Research Centre</h1>
      <p class="text-gray-500">Admin Panel</p>
    </div>
    
    <h2 class="text-2xl font-semibold text-center mb-6">Login</h2>
    
    <input type="text" id="username" value="grcadmin" 
           class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4" placeholder="Username">
    
    <input type="password" id="password" value="GrcAdmin2026Secure" 
           class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-6" placeholder="Password">
    
    <button onclick="handleLogin()" 
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">
      Login
    </button>
    
    <p id="message" class="text-center mt-4 text-red-500"></p>
  </div>

  <script>
    async function handleLogin() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.success) {
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('message').textContent = 'Invalid username or password';
      }
    }
  </script>
</body>
</html>
